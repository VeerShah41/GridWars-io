# Render Blueprint
services:
  - name: gridwars
    type: web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NODE_VERSION
        value: "22.x"
      - key: GRID_COLS
        value: "30"
      - key: GRID_ROWS
        value: "24"
      - key: CLAIM_COOLDOWN
        value: "3"
      - key: ENFORCE_ADJACENCY
        value: "true"
